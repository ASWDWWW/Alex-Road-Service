name: Deploy Firebase

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g firebase-tools
      - run: cd functions && npm ci
      - run: firebase deploy --only hosting,firestore:rules,firestore:indexes,functions --project "${{ secrets.FIREBASE_STAGING_PROJECT }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  deploy-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g firebase-tools
      - run: cd functions && npm ci
      - run: firebase deploy --only hosting,firestore:rules,firestore:indexes,functions --project "${{ secrets.FIREBASE_PROD_PROJECT }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
