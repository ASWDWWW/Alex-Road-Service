<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Firebase Setup | Alex Road Service</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { max-width: 560px; margin: 24px auto; padding: 0 20px; padding-top: 24px; font-family: system-ui, sans-serif; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 24px; }
    .btn { background: #c8102e; color: #fff; border: 0; padding: 12px 20px; border-radius: 8px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 12px; overflow: auto; font-size: 13px; }
    .ok { color: #0a7; } .err { color: #c00; }
  </style>
</head>
<body>
  <h1>Firebase Staff Bootstrap</h1>
  <p>Run once after deploying Cloud Functions. Creates admin, office, tech, and developer accounts with Firestore profiles.</p>
  <div class="card">
    <label>Bootstrap secret<br>
      <input id="secret" type="password" value="alex-road-bootstrap-2026" style="width:100%;padding:8px;margin:8px 0">
    </label>
    <label><input id="overwrite" type="checkbox"> Reset passwords for existing users</label>
    <p><button class="btn" id="runBtn">Bootstrap Staff</button></p>
    <pre id="out">Ready.</pre>
  </div>
  <p><a href="/login.html">Go to staff login</a></p>
  <script src="/js/firebase-config.js"></script>
  <script>
    document.getElementById('runBtn').addEventListener('click', async () => {
      const out = document.getElementById('out');
      out.textContent = 'Running bootstrapStaff…';
      try {
        await new Promise((r) => setTimeout(r, 500));
        if (!window.ARSFirebase?.app) throw new Error('Firebase not loaded — check config');
        const { getFunctions, httpsCallable } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js');
        const fn = httpsCallable(getFunctions(window.ARSFirebase.app, 'us-central1'), 'bootstrapStaff');
        const res = await fn({
          secret: document.getElementById('secret').value,
          overwritePasswords: document.getElementById('overwrite').checked,
        });
        out.className = 'ok';
        out.textContent = JSON.stringify(res.data, null, 2);
      } catch (e) {
        out.className = 'err';
        out.textContent = e.message || String(e);
      }
    });
  </script>
</body>
</html>
