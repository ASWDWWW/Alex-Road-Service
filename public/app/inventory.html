<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Inventory | Alex Road Service Ops</title>
  <link rel="stylesheet" href="/app/css/app.css?v=20260720w">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">
<div id="sidebar-placeholder"></div>
<main class="app-main">
  <div id="topbar-placeholder" data-title="Inventory"></div>
  <div class="app-content">

    <div class="page-header">
      <div>
        <div class="page-header__title">Parts &amp; Inventory</div>
        <div class="page-header__sub">Track stock levels, costs, and reorder alerts</div>
      </div>
      <div class="page-header__actions">
        <button class="btn btn--secondary btn--sm" id="reorderExportBtn"><i class="fas fa-file-download"></i> Reorder List</button>
        <button class="btn btn--primary" onclick="openModal('addPartModal')"><i class="fas fa-plus"></i> Add Part</button>
      </div>
    </div>

    <!-- KPI Row -->
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Total SKUs</div><div class="kpi-card__value" id="kpiSkuTotal">0</div></div>
          <div class="kpi-card__icon blue"><i class="fas fa-boxes"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">In Stock</div><div class="kpi-card__value green" id="kpiSkuInStock">0</div></div>
          <div class="kpi-card__icon green"><i class="fas fa-check-circle"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Low Stock</div><div class="kpi-card__value amber" id="kpiSkuLow">0</div></div>
          <div class="kpi-card__icon amber"><i class="fas fa-exclamation-triangle"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Out of Stock</div><div class="kpi-card__value red" id="kpiSkuOut">0</div></div>
          <div class="kpi-card__icon red"><i class="fas fa-times-circle"></i></div>
        </div>
      </div>
    </div>

    <div id="oosBanner"></div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-tabs" id="invFilterTabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="In Stock">In Stock</button>
        <button class="filter-tab" data-filter="Low">Low Stock</button>
        <button class="filter-tab" data-filter="Out of Stock">Out of Stock</button>
      </div>
      <div class="filter-search">
        <i class="fas fa-search"></i>
        <input type="text" id="invSearch" placeholder="Search part #, name, category…">
      </div>
      <div class="filter-search" style="width:160px">
        <select id="catFilter" style="border:none;outline:none;font-size:.83rem;color:var(--black);background:none;width:100%;cursor:pointer">
          <option value="">All Categories</option>
          <option>Brakes</option>
          <option>Air System</option>
          <option>Electrical</option>
          <option>Fuel</option>
          <option>Hydraulic</option>
          <option>Cooling</option>
          <option>Fluids</option>
        </select>
      </div>
      <span class="filter-count" id="invCount"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Part #</th><th>Description</th><th>Category</th>
            <th style="text-align:center">Qty</th><th style="text-align:center">Min Qty</th>
            <th style="text-align:right">Cost</th><th style="text-align:right">Sale Price</th>
            <th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="invTable"><tr><td colspan="9"><div class="loading-state"><div class="loading-state__spinner"></div><div class="loading-state__text">Loading…</div></div></td></tr></tbody>
      </table>
    </div>

  </div>
</main>

<!-- Add Part Modal -->
<div class="modal-overlay" id="addPartModal">
  <div class="modal">
    <div class="modal__header">
      <div class="modal__title">Add Part / Item</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Part Number *</label><input class="form-input" id="partNo" placeholder="e.g. AIR-BC-1650"></div>
        <div class="form-row">
          <label class="form-label">Category</label>
          <select class="form-select" id="partCat">
            <option>Brakes</option>
            <option>Air System</option>
            <option>Electrical</option>
            <option>Fuel</option>
            <option>Hydraulic</option>
            <option>Cooling</option>
            <option>Fluids</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-row"><label class="form-label">Description *</label><input class="form-input" id="partDesc" placeholder="Part name/description"></div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Current Qty</label><input class="form-input" id="partQty" type="number" placeholder="0" min="0"></div>
        <div class="form-row"><label class="form-label">Min Qty (Reorder Point)</label><input class="form-input" id="partMin" type="number" placeholder="0" min="0"></div>
      </div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Cost Price ($)</label><input class="form-input" id="partCost" type="number" placeholder="0.00" step="0.01"></div>
        <div class="form-row"><label class="form-label">Sale Price ($)</label><input class="form-input" id="partPrice" type="number" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="form-row"><label class="form-label">Supplier / Notes</label><input class="form-input" id="partSupplier" placeholder="Supplier name or notes"></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Cancel</button>
      <button class="btn btn--primary" id="savePartBtn"><i class="fas fa-check"></i> Add to Inventory</button>
    </div>
  </div>
</div>

<!-- Part Media Modal -->
<div class="modal-overlay" id="partMediaModal">
  <div class="modal" style="max-width:640px">
    <div class="modal__header">
      <div class="modal__title" id="partMediaTitle">Part Photos</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <div id="partMediaMount"></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Close</button>
    </div>
  </div>
</div>

<!-- Adjust Stock Modal -->
<div class="modal-overlay" id="adjustStockModal">
  <div class="modal" style="max-width:440px">
    <div class="modal__header">
      <div class="modal__title">Adjust Stock</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="adjPartId">
      <p id="adjPartLabel" style="margin:0 0 12px;color:var(--steel);font-size:.88rem"></p>
      <div class="form-row">
        <label class="form-label">Adjustment (+/- qty)</label>
        <input class="form-input" id="adjQty" type="text" placeholder="e.g. +5 or -3">
      </div>
      <div class="form-row">
        <label class="form-label">Note</label>
        <textarea class="form-textarea" id="adjNote" rows="2" placeholder="Reason for adjustment">manual adjustment</textarea>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Cancel</button>
      <button class="btn btn--primary" id="saveAdjStockBtn">Save</button>
    </div>
  </div>
</div>

<script src="/app/js/utils.js?v=20260721d"></script>
<script src="/app/js/demo-mode.js?v=20260720w"></script>
<script src="/app/js/data-store.js?v=20260720w"></script>
<script src="/app/js/auth.js?v=20260720w"></script>
<script src="/app/js/data-service.js?v=20260721d"></script>
<script src="/app/js/page-scripts.js?v=20260720w"></script>
<script src="/app/js/app-components.js?v=20260721d"></script>
<script>
  let activeFilter = 'all', searchVal = '', catVal = '', urlState = {};

  function inventoryStatusFilter(status) {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'attention') {
      return ARS.Pages.matchesStatusFilter(status, 'attention', 'inventory');
    }
    const normalized = activeFilter === 'Low Stock' ? 'Low' : activeFilter;
    return status === normalized;
  }

  function getFilteredInventory(all) {
    const q = searchVal.toLowerCase();
    return all.filter((p) => {
      if (catVal && p.cat !== catVal) return false;
      if (q && !String(p.partNo || '').toLowerCase().includes(q)
        && !String(p.desc || '').toLowerCase().includes(q)) return false;
      return inventoryStatusFilter(p.status);
    });
  }

  function rowBg(status) {
    if (status === 'Out of Stock') return 'background:rgba(229,31,43,.03)';
    if (status === 'Low') return 'background:#FFFBF5';
    return '';
  }

  function renderBanner(all) {
    const oos = all.filter(p => p.status === 'Out of Stock');
    const el = document.getElementById('oosBanner');
    if (!el) return;
    el.innerHTML = oos.length ? oos.map(p => `
      <a href="${ARS.Pages.appHref(`/app/inventory.html?status=Out%20of%20Stock&highlight=${encodeURIComponent(p.id)}`)}" class="alert-item alert-item--red" style="margin-bottom:14px;display:flex;text-decoration:none;color:inherit">
        <i class="fas fa-exclamation-circle alert-item__icon"></i>
        <div>
          <div class="alert-item__title">${ARS.Pages.escapeHtml(p.desc)} (${ARS.Pages.escapeHtml(p.id)}) is completely out of stock</div>
          <div class="alert-item__desc">Qty: ${ARS.Pages.escapeHtml(p.qty)} · Minimum: ${ARS.Pages.escapeHtml(p.min)} — Click to filter &amp; highlight this part</div>
        </div>
      </a>
    `).join('') : '';
  }

  function renderKpis(all) {
    document.getElementById('kpiSkuTotal').textContent = all.length;
    document.getElementById('kpiSkuInStock').textContent = all.filter(p => p.status === 'In Stock').length;
    document.getElementById('kpiSkuLow').textContent = all.filter(p => p.status === 'Low').length;
    document.getElementById('kpiSkuOut').textContent = all.filter(p => p.status === 'Out of Stock').length;
  }

  function renderTable() {
    const all = ARS.Data.listInventory();
    const data = getFilteredInventory(all);
    const loadError = ARS.FirestoreSync?.getCollectionError?.('inventory');
    renderKpis(all);
    renderBanner(all);
    document.getElementById('invCount').textContent = `${data.length} item${data.length !== 1 ? 's' : ''}`;
    document.getElementById('invTable').innerHTML = data.length ? data.map(p => `
      <tr data-row-id="${ARS.Pages.escapeHtml(p.id)}" style="${rowBg(p.status)}">
        <td class="td-mono td-bold" style="white-space:nowrap">${ARS.Pages.escapeHtml(p.partNo)}</td>
        <td class="td-primary">${ARS.Pages.escapeHtml(p.desc)}</td>
        <td><span style="font-size:.76rem;font-weight:600;color:var(--steel)">${ARS.Pages.escapeHtml(p.cat)}</span></td>
        <td style="text-align:center;font-weight:700;color:${p.qty === 0 ? 'var(--red)' : p.qty <= p.min ? '#D97706' : 'inherit'}">${ARS.Pages.escapeHtml(p.qty)}</td>
        <td style="text-align:center;color:var(--warm-gray)">${ARS.Pages.escapeHtml(p.min)}</td>
        <td style="text-align:right">${fmt$(p.cost)}</td>
        <td style="text-align:right;font-weight:600">${fmt$(p.price)}</td>
        <td>${chip(p.status)}</td>
        <td class="td-actions">
          <button class="btn btn--ghost btn--sm btn--icon" title="Adjust Stock" data-adjust-id="${ARS.Pages.escapeHtml(p.id)}"><i class="fas fa-plus-minus"></i></button>
          <button class="btn btn--ghost btn--sm btn--icon" title="Photos" data-media-id="${ARS.Pages.escapeHtml(p.id)}"><i class="fas fa-camera"></i></button>
        </td>
      </tr>
    `).join('') : ARS.Pages.tablePlaceholder(
      9,
      loadError ? 'Inventory could not be loaded. Refresh and try again.' : 'No items found',
      loadError ? 'fa-triangle-exclamation' : 'fa-boxes',
    );
  }

  window.openPartMedia = (partId) => {
    const part = ARS.Data.listInventory().find(p => p.id === partId);
    document.getElementById('partMediaTitle').textContent = part ? `${part.desc} — Photos` : 'Part Photos';
    openModal('partMediaModal');
    ARS.MediaUI.mount(document.getElementById('partMediaMount'), {
      entityType: 'inventory',
      entityId: partId,
      title: 'Part photos',
      getEntity: () => ARS.Data.listInventory().find(p => p.id === partId),
      onChanged: () => renderTable(),
    });
  };

  window.adjustStock = (partId) => {
    if (!ARS.can('inventory.edit')) return showToast('Permission denied', 'error');
    const part = ARS.Data.listInventory().find(p => p.id === partId);
    document.getElementById('adjPartId').value = partId;
    document.getElementById('adjPartLabel').textContent =
      `${part?.desc || partId} — current qty ${part?.qty ?? 0}`;
    document.getElementById('adjQty').value = '';
    document.getElementById('adjNote').value = 'manual adjustment';
    openModal('adjustStockModal');
    setTimeout(() => document.getElementById('adjQty')?.focus(), 50);
  };

  ARS.Pages.waitReady(() => {
    urlState = ARS.Pages.applyListQuery({ tabsId: 'invFilterTabs', searchId: 'invSearch' });
    activeFilter = urlState.filter;
    searchVal = urlState.q || '';
    ARS.Pages.openModalIfRequested('addPartModal');
    renderTable();
    ARS.Pages.bindKpiFilter('kpiSkuInStock', '/app/inventory.html?status=In Stock');
    ARS.Pages.bindKpiFilter('kpiSkuLow', '/app/inventory.html?status=Low');
    ARS.Pages.bindKpiFilter('kpiSkuOut', '/app/inventory.html?status=Out of Stock');
    ARS.Pages.bindKpiFilter('kpiSkuTotal', '/app/inventory.html');
    document.getElementById('invFilterTabs').addEventListener('click', e => {
      const btn = e.target.closest('.filter-tab'); if (!btn) return;
      document.querySelectorAll('#invFilterTabs .filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); activeFilter = btn.dataset.filter; renderTable();
    });
    document.getElementById('invSearch').addEventListener('input', e => { searchVal = e.target.value; renderTable(); });
    document.getElementById('catFilter').addEventListener('change', e => { catVal = e.target.value; renderTable(); });
    document.getElementById('invTable').addEventListener('click', (e) => {
      const adjust = e.target.closest('[data-adjust-id]');
      if (adjust) return adjustStock(adjust.dataset.adjustId);
      const media = e.target.closest('[data-media-id]');
      if (media) openPartMedia(media.dataset.mediaId);
    });
    document.addEventListener('ars:data-changed', renderTable);

    document.getElementById('reorderExportBtn')?.addEventListener('click', () => {
      const low = ARS.Data.getLowStock();
      const rows = low.map(p => [p.id, p.partNo, p.desc, p.cat, p.qty, p.min, p.cost, p.price, p.status]);
      ARS.exportCSV('reorder-list.csv', ['ID','Part #','Description','Category','Qty','Min','Cost','Price','Status'], rows);
      showToast('Reorder list exported', 'success');
    });

    document.getElementById('savePartBtn')?.addEventListener('click', async () => {
      if (!ARS.can('inventory.edit')) return showToast('Permission denied', 'error');
      const partNo = document.getElementById('partNo').value.trim();
      const desc = document.getElementById('partDesc').value.trim();
      if (!partNo || !desc) return showToast('Part number and description required', 'error');
      let part;
      try {
        part = await ARS.Data.createPart({
          partNo,
          desc,
          cat: document.getElementById('partCat').value,
          qty: document.getElementById('partQty').value,
          min: document.getElementById('partMin').value,
          cost: document.getElementById('partCost').value,
          price: document.getElementById('partPrice').value,
          supplier: document.getElementById('partSupplier')?.value.trim() || '',
        });
      } catch (e) {
        return showToast(e.message, 'error');
      }
      closeModal('addPartModal');
      ['partNo','partDesc','partQty','partMin','partCost','partPrice','partSupplier'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      renderTable();
      ARS.Pages.successWithView({
        title: 'Part added',
        message: `${part.desc} (${part.partNo}) added to inventory.`,
        href: `/app/inventory.html?highlight=${part.id}`,
      });
    });

    document.getElementById('saveAdjStockBtn')?.addEventListener('click', async () => {
      if (!ARS.can('inventory.edit')) return showToast('Permission denied', 'error');
      const partId = document.getElementById('adjPartId').value;
      const qtyStr = document.getElementById('adjQty').value.trim();
      if (!qtyStr) return showToast('Enter an adjustment amount', 'error');
      const delta = Number(qtyStr.replace(/^\+/, ''));
      if (isNaN(delta)) return showToast('Invalid adjustment amount', 'error');
      const note = document.getElementById('adjNote').value.trim() || 'manual adjustment';
      try {
        await ARS.Data.adjustStock(partId, delta, note);
        closeModal('adjustStockModal');
        renderTable();
        showToast('Stock adjusted', 'success');
      } catch (e) {
        showToast(e.message, 'error');
      }
    });
  });
</script>
</body>
</html>
