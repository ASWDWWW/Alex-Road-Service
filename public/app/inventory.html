<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Inventory | Alex Road Service Ops</title>
  <link rel="stylesheet" href="/app/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">
<div id="sidebar-placeholder"></div>
<main class="app-main">
  <div id="topbar-placeholder" data-title="Inventory"></div>
  <div class="app-content">

    <div class="page-header">
      <div>
        <div class="page-header__title">Parts &amp; Inventory</div>
        <div class="page-header__sub">Track stock levels, costs, and reorder alerts</div>
      </div>
      <div class="page-header__actions">
        <button class="btn btn--secondary btn--sm" id="reorderExportBtn"><i class="fas fa-file-download"></i> Reorder List</button>
        <button class="btn btn--primary" onclick="openModal('addPartModal')"><i class="fas fa-plus"></i> Add Part</button>
      </div>
    </div>

    <!-- KPI Row -->
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Total SKUs</div><div class="kpi-card__value" id="kpiSkuTotal">0</div></div>
          <div class="kpi-card__icon blue"><i class="fas fa-boxes"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">In Stock</div><div class="kpi-card__value green" id="kpiSkuInStock">0</div></div>
          <div class="kpi-card__icon green"><i class="fas fa-check-circle"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Low Stock</div><div class="kpi-card__value amber" id="kpiSkuLow">0</div></div>
          <div class="kpi-card__icon amber"><i class="fas fa-exclamation-triangle"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Out of Stock</div><div class="kpi-card__value red" id="kpiSkuOut">0</div></div>
          <div class="kpi-card__icon red"><i class="fas fa-times-circle"></i></div>
        </div>
      </div>
    </div>

    <div id="oosBanner"></div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-tabs" id="invFilterTabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="In Stock">In Stock</button>
        <button class="filter-tab" data-filter="Low">Low Stock</button>
        <button class="filter-tab" data-filter="Out of Stock">Out of Stock</button>
      </div>
      <div class="filter-search">
        <i class="fas fa-search"></i>
        <input type="text" id="invSearch" placeholder="Search part #, name, category…">
      </div>
      <div class="filter-search" style="width:160px">
        <select id="catFilter" style="border:none;outline:none;font-size:.83rem;color:var(--black);background:none;width:100%;cursor:pointer">
          <option value="">All Categories</option>
          <option>Brakes</option>
          <option>Air System</option>
          <option>Electrical</option>
          <option>Fuel</option>
          <option>Hydraulic</option>
          <option>Cooling</option>
          <option>Fluids</option>
        </select>
      </div>
      <span class="filter-count" id="invCount"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Part #</th><th>Description</th><th>Category</th>
            <th style="text-align:center">Qty</th><th style="text-align:center">Min Qty</th>
            <th style="text-align:right">Cost</th><th style="text-align:right">Sale Price</th>
            <th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="invTable"></tbody>
      </table>
    </div>

  </div>
</main>

<!-- Add Part Modal -->
<div class="modal-overlay" id="addPartModal">
  <div class="modal">
    <div class="modal__header">
      <div class="modal__title">Add Part / Item</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Part Number *</label><input class="form-input" id="partNo" placeholder="e.g. AIR-BC-1650"></div>
        <div class="form-row">
          <label class="form-label">Category</label>
          <select class="form-select" id="partCat">
            <option>Brakes</option>
            <option>Air System</option>
            <option>Electrical</option>
            <option>Fuel</option>
            <option>Hydraulic</option>
            <option>Cooling</option>
            <option>Fluids</option>
            <option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-row"><label class="form-label">Description *</label><input class="form-input" id="partDesc" placeholder="Part name/description"></div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Current Qty</label><input class="form-input" id="partQty" type="number" placeholder="0" min="0"></div>
        <div class="form-row"><label class="form-label">Min Qty (Reorder Point)</label><input class="form-input" id="partMin" type="number" placeholder="0" min="0"></div>
      </div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Cost Price ($)</label><input class="form-input" id="partCost" type="number" placeholder="0.00" step="0.01"></div>
        <div class="form-row"><label class="form-label">Sale Price ($)</label><input class="form-input" id="partPrice" type="number" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="form-row"><label class="form-label">Supplier / Notes</label><input class="form-input" id="partSupplier" placeholder="Supplier name or notes"></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Cancel</button>
      <button class="btn btn--primary" id="savePartBtn"><i class="fas fa-check"></i> Add to Inventory</button>
    </div>
  </div>
</div>

<script src="/app/js/utils.js"></script>
<script src="/app/js/demo-mode.js"></script>
<script src="/app/js/data-store.js"></script>
<script src="/app/js/auth.js"></script>
<script src="/app/js/data-service.js"></script>
<script src="/app/js/page-scripts.js"></script>
<script src="/app/js/app-components.js"></script>
<script>
  let activeFilter = 'all', searchVal = '', catVal = '';

  function rowBg(status) {
    if (status === 'Out of Stock') return 'background:rgba(229,31,43,.03)';
    if (status === 'Low') return 'background:#FFFBF5';
    return '';
  }

  function renderBanner() {
    const oos = ARS.Data.listInventory().filter(p => p.status === 'Out of Stock');
    const el = document.getElementById('oosBanner');
    if (!el) return;
    el.innerHTML = oos.length ? oos.map(p => `
      <div class="alert-item alert-item--red" style="margin-bottom:14px">
        <i class="fas fa-exclamation-circle alert-item__icon"></i>
        <div>
          <div class="alert-item__title">${p.desc} (${p.id}) is completely out of stock</div>
          <div class="alert-item__desc">Qty: ${p.qty} · Minimum: ${p.min} — Reorder immediately to avoid job delays</div>
        </div>
      </div>
    `).join('') : '';
  }

  function renderKpis(all) {
    document.getElementById('kpiSkuTotal').textContent = all.length;
    document.getElementById('kpiSkuInStock').textContent = all.filter(p => p.status === 'In Stock').length;
    document.getElementById('kpiSkuLow').textContent = all.filter(p => p.status === 'Low').length;
    document.getElementById('kpiSkuOut').textContent = all.filter(p => p.status === 'Out of Stock').length;
  }

  function renderTable() {
    const filters = { q: searchVal };
    if (activeFilter !== 'all') filters.status = activeFilter;
    if (catVal) filters.cat = catVal;
    const data = ARS.Data.listInventory(filters);
    const all = ARS.Data.listInventory();
    renderKpis(all);
    renderBanner();
    document.getElementById('invCount').textContent = `${data.length} item${data.length !== 1 ? 's' : ''}`;
    document.getElementById('invTable').innerHTML = data.length ? data.map(p => `
      <tr style="${rowBg(p.status)}">
        <td class="td-mono td-bold" style="white-space:nowrap">${p.partNo}</td>
        <td class="td-primary">${p.desc}</td>
        <td><span style="font-size:.76rem;font-weight:600;color:var(--steel)">${p.cat}</span></td>
        <td style="text-align:center;font-weight:700;color:${p.qty === 0 ? 'var(--red)' : p.qty <= p.min ? '#D97706' : 'inherit'}">${p.qty}</td>
        <td style="text-align:center;color:var(--warm-gray)">${p.min}</td>
        <td style="text-align:right">${fmt$(p.cost)}</td>
        <td style="text-align:right;font-weight:600">${fmt$(p.price)}</td>
        <td>${chip(p.status)}</td>
        <td class="td-actions">
          <button class="btn btn--ghost btn--sm btn--icon" title="Adjust Stock" onclick="adjustStock('${p.id}')"><i class="fas fa-plus-minus"></i></button>
        </td>
      </tr>
    `).join('') : `<tr><td colspan="9"><div class="empty-state"><div class="empty-state__icon"><i class="fas fa-boxes"></i></div><div class="empty-state__title">No items found</div></div></td></tr>`;
  }

  window.adjustStock = (partId) => {
    if (!ARS.can('inventory.edit')) return showToast('Permission denied', 'error');
    const part = ARS.Data.listInventory().find(p => p.id === partId);
    const input = prompt(`Adjust stock for ${part?.desc || partId}\nEnter +1, -1, or any number (e.g. +5, -3):`);
    if (input === null || input.trim() === '') return;
    const delta = Number(input.replace(/^\+/, ''));
    if (isNaN(delta)) return showToast('Invalid adjustment amount', 'error');
    try {
      ARS.Data.adjustStock(partId, delta, 'manual adjustment');
      renderTable();
      showToast(`Stock adjusted for ${part?.desc || partId}`, 'success');
    } catch (e) {
      showToast(e.message, 'error');
    }
  };

  ARS.Pages.waitReady(() => {
    renderTable();
    document.getElementById('invFilterTabs').addEventListener('click', e => {
      const btn = e.target.closest('.filter-tab'); if (!btn) return;
      document.querySelectorAll('#invFilterTabs .filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); activeFilter = btn.dataset.filter; renderTable();
    });
    document.getElementById('invSearch').addEventListener('input', e => { searchVal = e.target.value; renderTable(); });
    document.getElementById('catFilter').addEventListener('change', e => { catVal = e.target.value; renderTable(); });
    document.addEventListener('ars:data-changed', renderTable);

    document.getElementById('reorderExportBtn')?.addEventListener('click', () => {
      const low = ARS.Data.getLowStock();
      const rows = low.map(p => [p.id, p.partNo, p.desc, p.cat, p.qty, p.min, p.cost, p.price, p.status]);
      ARS.exportCSV('reorder-list.csv', ['ID','Part #','Description','Category','Qty','Min','Cost','Price','Status'], rows);
      showToast('Reorder list exported', 'success');
    });

    document.getElementById('savePartBtn')?.addEventListener('click', async () => {
      if (!ARS.can('inventory.edit')) return showToast('Permission denied', 'error');
      const partNo = document.getElementById('partNo').value.trim();
      const desc = document.getElementById('partDesc').value.trim();
      if (!partNo || !desc) return showToast('Part number and description required', 'error');
      try {
        await ARS.Data.createPart({
          partNo,
          desc,
          cat: document.getElementById('partCat').value,
          qty: document.getElementById('partQty').value,
          min: document.getElementById('partMin').value,
          cost: document.getElementById('partCost').value,
          price: document.getElementById('partPrice').value,
        });
      } catch (e) {
        return showToast(e.message, 'error');
      }
      closeModal('addPartModal');
      ['partNo','partDesc','partQty','partMin','partCost','partPrice','partSupplier'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      renderTable();
      showToast('Part added to inventory!', 'success');
    });
  });
</script>
</body>
</html>
