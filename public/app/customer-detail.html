<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Customer Detail | Alex Road Service Ops</title>
  <link rel="stylesheet" href="/app/css/app.css?v=20260720w">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">
<div id="sidebar-placeholder"></div>
<main class="app-main">
  <div id="topbar-placeholder" data-title="Customer Detail"></div>
  <div class="app-content" id="detailRoot"><div class="loading-state"><div class="loading-state__spinner"></div><div class="loading-state__text">Loading customer…</div></div></div>
</main>

<div class="modal-overlay" id="editCustModal">
  <div class="modal">
    <div class="modal__header">
      <div class="modal__title">Edit Customer</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <div class="form-row"><label class="form-label">Name</label><input class="form-input" id="eName"></div>
      <div class="form-row"><label class="form-label">Company</label><input class="form-input" id="eCompany"></div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Phone</label><input class="form-input" id="ePhone"></div>
        <div class="form-row"><label class="form-label">Email</label><input class="form-input" id="eEmail"></div>
      </div>
      <div class="form-row"><label class="form-label">Notes</label><textarea class="form-textarea" id="eNotes"></textarea></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Cancel</button>
      <button class="btn btn--primary" id="saveEditCust"><i class="fas fa-save"></i> Save</button>
    </div>
  </div>
</div>

<script src="/app/js/utils.js?v=20260720w"></script>
<script src="/app/js/demo-mode.js?v=20260720w"></script>
<script src="/app/js/data-store.js?v=20260720w"></script>
<script src="/app/js/auth.js?v=20260720w"></script>
<script src="/app/js/data-service.js?v=20260720w"></script>
<script src="/app/js/page-scripts.js?v=20260720w"></script>
<script src="/app/js/app-components.js?v=20260720w"></script>
<script>
  let customerId = null;

  function render() {
    customerId = new URLSearchParams(location.search).get('id');
    const c = ARS.Data.getCustomer(customerId);
    if (!c) {
      document.getElementById('detailRoot').innerHTML = ARS.Pages.isDataReady()
        ? '<div class="empty-state"><div class="empty-state__title">Customer not found</div><a href="/app/customers.html" class="btn btn--secondary" style="margin-top:12px">Back</a></div>'
        : '<div class="loading-state"><div class="loading-state__spinner"></div><div class="loading-state__text">Loading customer…</div></div>';
      return;
    }
    const trucks = ARS.Data.listTrucks({ customerId });
    const wos = ARS.Data.listWorkOrders().filter(w => w.customerId === customerId);
    const canEdit = ARS.can('customers.edit');
    const cid = encodeURIComponent(customerId);
    document.getElementById('detailRoot').innerHTML = `
      <div class="page-header">
        <div>
          <a href="/app/customers.html" style="font-size:.8rem;color:var(--steel)"><i class="fas fa-arrow-left"></i> Customers</a>
          <div class="page-header__title" style="margin-top:8px">${c.name}</div>
          <div class="page-header__sub">${c.company} · ${chip(c.type)} ${chip(c.status)}</div>
        </div>
        <div class="page-header__actions" style="display:flex;gap:8px;flex-wrap:wrap">
          <a href="tel:${c.phone.replace(/\D/g,'')}" class="btn btn--secondary"><i class="fas fa-phone"></i> ${c.phone}</a>
          ${ARS.can('workOrders.create') ? `<a href="${ARS.Pages.appHref(`/app/work-orders.html?customerId=${customerId}&open=create`)}" class="btn btn--primary"><i class="fas fa-plus"></i> New WO</a>` : ''}
          ${ARS.can('estimates.create') ? `<a href="${ARS.Pages.appHref(`/app/estimates.html?customerId=${customerId}&open=create`)}" class="btn btn--secondary"><i class="fas fa-file-alt"></i> New Estimate</a>` : ''}
          ${canEdit ? `<button class="btn btn--ghost" id="editCustBtn"><i class="fas fa-pencil-alt"></i> Edit</button>` : ''}
        </div>
      </div>
      <div class="kpi-grid" style="margin-bottom:18px">
        <div class="kpi-card" id="kpiTrucks"><div class="kpi-card__label">Trucks</div><div class="kpi-card__value">${trucks.length}</div></div>
        <div class="kpi-card" id="kpiWOs"><div class="kpi-card__label">Work Orders</div><div class="kpi-card__value">${wos.length}</div></div>
        <div class="kpi-card"><div class="kpi-card__label">Lifetime Spent</div><div class="kpi-card__value green">${c.spent}</div></div>
        <div class="kpi-card"><div class="kpi-card__label">Last Service</div><div class="kpi-card__value kpi-card__value--sm">${c.lastService}</div></div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
        <a href="${ARS.Pages.appHref(`/app/work-orders.html?customerId=${customerId}`)}" class="btn btn--ghost btn--sm">View all work orders</a>
        <a href="${ARS.Pages.appHref(`/app/invoices.html?q=${cid}`)}" class="btn btn--ghost btn--sm">View all invoices</a>
        <a href="${ARS.Pages.appHref(`/app/payments.html?q=${encodeURIComponent(c.name)}`)}" class="btn btn--ghost btn--sm">View all payments</a>
      </div>
      <div class="dash-grid">
        <div class="app-card">
          <div class="app-card__header"><div class="app-card__title">Fleet Units</div>
            ${canEdit ? `<a href="${ARS.Pages.appHref(`/app/trucks.html?open=create&customerId=${customerId}`)}" class="btn btn--ghost btn--sm"><i class="fas fa-plus"></i> Add Truck</a>` : ''}
          </div>
          <div class="table-wrap" style="border:none">
            <table><thead><tr><th>Unit</th><th>Vehicle</th><th>Status</th><th></th></tr></thead>
            <tbody>${trucks.map(t => `<tr><td>Unit ${t.unit}</td><td>${t.year} ${t.make} ${t.model}</td><td>${chip(t.status)}</td><td><a href="/app/truck-detail.html?id=${t.id}" class="btn btn--ghost btn--sm">View</a></td></tr>`).join('') || '<tr><td colspan="4">No trucks</td></tr>'}</tbody></table>
          </div>
        </div>
        <div class="app-card">
          <div class="app-card__header"><div class="app-card__title">Recent Work Orders</div></div>
          <div class="table-wrap" style="border:none">
            <table><thead><tr><th>WO</th><th>Date</th><th>Status</th><th>Total</th></tr></thead>
            <tbody>${wos.slice(0,8).map(w => `<tr><td><a href="/app/work-order-detail.html?id=${w.id}">${w.id}</a></td><td>${w.date}</td><td>${chip(w.status)}</td><td>${fmt$(w.total)}</td></tr>`).join('') || '<tr><td colspan="4">No work orders</td></tr>'}</tbody></table>
          </div>
        </div>
      </div>
      ${c.notes ? `<div class="app-card" style="margin-top:16px"><div class="app-card__body"><strong>Notes:</strong> ${c.notes}</div></div>` : ''}
      <div class="app-card" style="margin-top:16px"><div class="app-card__body" id="mediaMount"></div></div>`;

    ARS.MediaUI.mount(document.getElementById('mediaMount'), {
      entityType: 'customers',
      entityId: c.id,
      title: 'Account photos / logo',
      getEntity: () => ARS.Data.getCustomer(c.id),
    });

    document.getElementById('editCustBtn')?.addEventListener('click', () => {
      document.getElementById('eName').value = c.name;
      document.getElementById('eCompany').value = c.company === '—' ? '' : c.company;
      document.getElementById('ePhone').value = c.phone;
      document.getElementById('eEmail').value = c.email || '';
      document.getElementById('eNotes').value = c.notes || '';
      openModal('editCustModal');
    });

    ARS.Pages.bindKpiFilter('kpiTrucks', `/app/trucks.html?customerId=${customerId}`);
    ARS.Pages.bindKpiFilter('kpiWOs', `/app/work-orders.html?customerId=${customerId}`);
  }

  ARS.Pages.waitReady(() => {
    render();
    document.addEventListener('ars:data-changed', render);
    document.getElementById('saveEditCust')?.addEventListener('click', async () => {
      if (!ARS.can('customers.edit')) return showToast('Permission denied', 'error');
      try {
        await ARS.Data.updateCustomer(customerId, {
          name: document.getElementById('eName').value.trim(),
          company: document.getElementById('eCompany').value.trim() || '—',
          phone: document.getElementById('ePhone').value.trim(),
          email: document.getElementById('eEmail').value.trim(),
          notes: document.getElementById('eNotes').value.trim(),
        });
        closeModal('editCustModal');
        showToast('Customer updated', 'success');
        render();
      } catch (e) {
        showToast(e.message, 'error');
      }
    });
  });
</script>
</body>
</html>
