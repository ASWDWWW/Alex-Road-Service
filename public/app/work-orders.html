<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Work Orders | Alex Road Service Ops</title>
  <link rel="stylesheet" href="/app/css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">
<div id="sidebar-placeholder"></div>
<main class="app-main">
  <div id="topbar-placeholder" data-title="Work Orders"></div>
  <div class="app-content">

    <div class="page-header">
      <div>
        <div class="page-header__title">Work Orders</div>
        <div class="page-header__sub">Create, track, and close all repair jobs</div>
      </div>
      <div class="page-header__actions">
        <button class="btn btn--secondary btn--sm" id="woExportBtn"><i class="fas fa-download"></i> Export</button>
        <button class="btn btn--primary" onclick="openModal('createWoModal')"><i class="fas fa-plus"></i> Create Work Order</button>
      </div>
    </div>

    <!-- KPI Row -->
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Open</div><div class="kpi-card__value" id="kpiOpen">0</div></div>
          <div class="kpi-card__icon blue"><i class="fas fa-clipboard"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">In Progress</div><div class="kpi-card__value red" id="kpiInProgress">0</div></div>
          <div class="kpi-card__icon red"><i class="fas fa-tools"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Waiting Parts</div><div class="kpi-card__value amber" id="kpiWaitingParts">0</div></div>
          <div class="kpi-card__icon amber"><i class="fas fa-boxes"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Completed (MTD)</div><div class="kpi-card__value green" id="kpiCompletedMTD">0</div></div>
          <div class="kpi-card__icon green"><i class="fas fa-check-double"></i></div>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-tabs" id="woFilterTabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="Open">Open</button>
        <button class="filter-tab" data-filter="In Progress">In Progress</button>
        <button class="filter-tab" data-filter="Waiting Parts">Waiting Parts</button>
        <button class="filter-tab" data-filter="Completed">Completed</button>
        <button class="filter-tab" data-filter="Invoiced">Invoiced</button>
      </div>
      <div class="filter-search">
        <i class="fas fa-search"></i>
        <input type="text" id="woSearch" placeholder="Search WO #, customer…">
      </div>
      <span class="filter-count" id="woCount"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>WO #</th><th>Date</th><th>Customer</th><th>Truck</th>
            <th>Description</th><th>Tech</th><th>Labor</th><th>Parts</th><th>Total</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="woTable"></tbody>
      </table>
    </div>

  </div>
</main>

<!-- Create WO Modal -->
<div class="modal-overlay" id="createWoModal">
  <div class="modal" style="max-width:600px">
    <div class="modal__header">
      <div class="modal__title">Create Work Order</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Customer *</label>
          <select class="form-select" id="woCustomer"></select>
        </div>
        <div class="form-row">
          <label class="form-label">Truck / Unit *</label>
          <select class="form-select" id="woTruck"></select>
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Service Type *</label>
          <select class="form-select" id="woServiceType"></select>
        </div>
        <div class="form-row">
          <label class="form-label">Assigned Tech</label>
          <select class="form-select" id="woTech"></select>
        </div>
      </div>
      <div class="form-row"><label class="form-label">Description / Complaint *</label><textarea class="form-textarea" id="woDesc" placeholder="Describe the issue or work to be done…"></textarea></div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Estimated Labor ($)</label><input class="form-input" id="woLabor" type="number" placeholder="0.00" min="0" step="0.01"></div>
        <div class="form-row"><label class="form-label">Estimated Parts ($)</label><input class="form-input" id="woParts" type="number" placeholder="0.00" min="0" step="0.01"></div>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Status</label>
          <select class="form-select" id="woStatus">
            <option>Open</option>
            <option>In Progress</option>
            <option>Waiting Parts</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">Date</label><input class="form-input" id="woDate" type="date"></div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Cancel</button>
      <button class="btn btn--primary" id="saveWoBtn"><i class="fas fa-check"></i> Create WO</button>
    </div>
  </div>
</div>

<script src="/app/js/utils.js"></script>
<script src="/app/js/demo-mode.js"></script>
<script src="/app/js/data-store.js"></script>
<script src="/app/js/auth.js"></script>
<script src="/app/js/data-service.js"></script>
<script src="/app/js/documents.js"></script>
<script src="/app/js/page-scripts.js"></script>
<script src="/app/js/app-components.js"></script>
<script>
  let activeFilter = 'all', searchVal = '';

  function renderKpis() {
    const kpis = ARS.Data.getDashboardKPIs();
    document.getElementById('kpiOpen').textContent = kpis.openByStatus.Open || 0;
    document.getElementById('kpiInProgress').textContent = kpis.openByStatus['In Progress'] || 0;
    document.getElementById('kpiWaitingParts').textContent = kpis.openByStatus['Waiting Parts'] || 0;
    document.getElementById('kpiCompletedMTD').textContent = kpis.completedMTD || 0;
  }

  function renderTable() {
    renderKpis();
    const filters = { q: searchVal };
    if (activeFilter !== 'all') filters.status = activeFilter;
    const data = ARS.Data.listWorkOrders(filters);
    document.getElementById('woCount').textContent = `${data.length} order${data.length !== 1 ? 's' : ''}`;
    const canInvoice = ARS.can('workOrders.invoice');
    document.getElementById('woTable').innerHTML = data.length ? data.map(w => `
      <tr>
        <td class="td-mono td-bold" style="white-space:nowrap"><a href="/app/work-order-detail.html?id=${w.id}" style="color:inherit;text-decoration:none">${w.id}</a></td>
        <td class="td-muted" style="white-space:nowrap">${w.date}</td>
        <td class="td-primary">${w.customerName}</td>
        <td class="td-muted td-wrap" style="font-size:.76rem;line-height:1.4">${w.truckLabel || '—'}</td>
        <td class="td-wrap" style="font-size:.8rem;color:var(--steel)">${w.desc}</td>
        <td class="td-muted">${w.tech || '—'}</td>
        <td style="text-align:right">${fmt$(w.labor)}</td>
        <td style="text-align:right">${fmt$(w.parts)}</td>
        <td style="text-align:right;font-weight:700">${fmt$(w.total)}</td>
        <td>${chip(w.status)}</td>
        <td class="td-actions">
          <a class="btn btn--ghost btn--sm btn--icon" href="/app/work-order-detail.html?id=${w.id}" title="View"><i class="fas fa-eye"></i></a>
          ${w.status === 'Completed' && !w.invoiced && canInvoice ? `<button class="btn btn--primary btn--sm" onclick="invoiceWO('${w.id}')">Invoice</button>` : ''}
        </td>
      </tr>
    `).join('') : `<tr><td colspan="11"><div class="empty-state"><div class="empty-state__icon"><i class="fas fa-clipboard-list"></i></div><div class="empty-state__title">No work orders found</div></div></td></tr>`;
  }

  window.invoiceWO = async (id) => {
    if (!ARS.can('workOrders.invoice')) return showToast('Permission denied', 'error');
    try {
      const inv = await ARS.Data.createInvoiceFromWO(id);
      renderTable();
      showToast(`Invoice ${inv.id} created`, 'success');
    } catch (e) {
      showToast(e.message, 'error');
    }
  };

  function initCreateModal() {
    const custSel = document.getElementById('woCustomer');
    const truckSel = document.getElementById('woTruck');
    ARS.Pages.populateCustomerSelect(custSel);
    ARS.Pages.populateServiceSelect(document.getElementById('woServiceType'));
    ARS.Pages.populateTechSelect(document.getElementById('woTech'));
    document.getElementById('woDate').value = ARS.toInputDate();

    const params = new URLSearchParams(window.location.search);
    const preCustomer = params.get('customerId');
    const preTruck = params.get('truckId');
    if (preCustomer) {
      custSel.value = preCustomer;
      ARS.Pages.populateTruckSelect(truckSel, preCustomer, preTruck || '');
      if (preTruck) openModal('createWoModal');
    }

    custSel.addEventListener('change', () => {
      ARS.Pages.populateTruckSelect(truckSel, custSel.value);
    });
  }

  ARS.Pages.waitReady(() => {
    initCreateModal();
    renderTable();
    ARS.Pages.bindFilters('woFilterTabs', 'woSearch', 'woCount', ({ filter, q }) => {
      if (filter !== undefined) activeFilter = filter;
      if (q !== undefined) searchVal = q;
      renderTable();
    });
    document.addEventListener('ars:data-changed', renderTable);

    document.getElementById('woExportBtn')?.addEventListener('click', () => {
      const rows = ARS.Data.listWorkOrders().map(w =>
        [w.id, w.date, w.customerName, w.truckLabel, w.tech, w.status, w.labor, w.parts, w.total]
      );
      ARS.exportCSV('work-orders.csv', ['WO','Date','Customer','Truck','Tech','Status','Labor','Parts','Total'], rows);
      showToast('Work orders exported', 'success');
    });

    document.getElementById('saveWoBtn')?.addEventListener('click', async () => {
      if (!ARS.can('workOrders.create')) return showToast('Permission denied', 'error');
      const custSel = document.getElementById('woCustomer');
      const truckSel = document.getElementById('woTruck');
      const customerId = custSel.value;
      const truckId = truckSel.value;
      const desc = document.getElementById('woDesc').value.trim();
      if (!customerId || !truckId || !desc) return showToast('Customer, truck, and description required', 'error');
      const custOpt = custSel.selectedOptions[0];
      const truckOpt = truckSel.selectedOptions[0];
      try {
        await ARS.Data.createWorkOrder({
          customerId,
          customerName: custOpt?.dataset.name || custOpt?.textContent,
          truckId,
          truckLabel: truckOpt?.dataset.label || truckOpt?.textContent,
          serviceType: document.getElementById('woServiceType').value,
          tech: document.getElementById('woTech').value,
          desc,
          labor: document.getElementById('woLabor').value,
          parts: document.getElementById('woParts').value,
          status: document.getElementById('woStatus').value,
          date: document.getElementById('woDate').value,
        });
        closeModal('createWoModal');
        document.getElementById('woDesc').value = '';
        document.getElementById('woLabor').value = '';
        document.getElementById('woParts').value = '';
        renderTable();
        showToast('Work order created successfully!', 'success');
      } catch (e) {
        showToast(e.message, 'error');
      }
    });
  });
</script>
</body>
</html>
