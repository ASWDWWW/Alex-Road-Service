<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Work Orders | Alex Road Service Ops</title>
  <link rel="stylesheet" href="/app/css/app.css?v=20260720w">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">
<div id="sidebar-placeholder"></div>
<main class="app-main">
  <div id="topbar-placeholder" data-title="Work Orders"></div>
  <div class="app-content">

    <div class="page-header">
      <div>
        <div class="page-header__title">Work Orders</div>
        <div class="page-header__sub">Create, track, and close all repair jobs</div>
      </div>
      <div class="page-header__actions">
        <button class="btn btn--secondary btn--sm" id="woExportBtn"><i class="fas fa-download"></i> Export</button>
        <button class="btn btn--primary" id="createWoBtn"><i class="fas fa-plus"></i> Create Work Order</button>
      </div>
    </div>

    <!-- KPI Row -->
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Open</div><div class="kpi-card__value" id="kpiOpen">0</div></div>
          <div class="kpi-card__icon blue"><i class="fas fa-clipboard"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">In Progress</div><div class="kpi-card__value red" id="kpiInProgress">0</div></div>
          <div class="kpi-card__icon red"><i class="fas fa-tools"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Waiting Parts</div><div class="kpi-card__value amber" id="kpiWaitingParts">0</div></div>
          <div class="kpi-card__icon amber"><i class="fas fa-boxes"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Completed (MTD)</div><div class="kpi-card__value green" id="kpiCompletedMTD">0</div></div>
          <div class="kpi-card__icon green"><i class="fas fa-check-double"></i></div>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-tabs" id="woFilterTabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="Open">Open</button>
        <button class="filter-tab" data-filter="In Progress">In Progress</button>
        <button class="filter-tab" data-filter="Waiting Parts">Waiting Parts</button>
        <button class="filter-tab" data-filter="Completed">Completed</button>
        <button class="filter-tab" data-filter="Invoiced">Invoiced</button>
      </div>
      <div class="filter-search">
        <i class="fas fa-search"></i>
        <input type="text" id="woSearch" placeholder="Search WO #, customer…">
      </div>
      <span class="filter-count" id="woCount"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>WO #</th><th>Date</th><th>Customer</th><th>Truck</th>
            <th>Description</th><th>Tech</th><th>Labor</th><th>Parts</th><th>Total</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="woTable"><tr><td colspan="11"><div class="loading-state"><div class="loading-state__spinner"></div><div class="loading-state__text">Loading…</div></div></td></tr></tbody>
      </table>
    </div>

  </div>
</main>

<!-- Create WO Modal -->
<div class="modal-overlay" id="createWoModal">
  <div class="modal" style="max-width:600px">
    <div class="modal__header">
      <div class="modal__title">Create Work Order</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Customer *</label>
          <select class="form-select" id="woCustomer"></select>
        </div>
        <div class="form-row">
          <label class="form-label">Truck / Unit *</label>
          <select class="form-select" id="woTruck"></select>
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Service Type *</label>
          <select class="form-select" id="woServiceType"></select>
        </div>
        <div class="form-row">
          <label class="form-label">Assigned Technicians</label>
          <div class="tech-picker" id="woTechPicker"></div>
          <div class="td-muted" style="font-size:.75rem;margin-top:4px">Select one or more technicians</div>
        </div>
      </div>
      <div class="form-row"><label class="form-label">Description / Complaint *</label><textarea class="form-textarea" id="woDesc" placeholder="Describe the issue or work to be done…"></textarea></div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Estimated Labor ($)</label><input class="form-input" id="woLabor" type="number" placeholder="0.00" min="0" step="0.01"></div>
        <div class="form-row"><label class="form-label">Estimated Parts ($)</label><input class="form-input" id="woParts" type="number" placeholder="0.00" min="0" step="0.01"></div>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Status</label>
          <select class="form-select" id="woStatus">
            <option>Open</option>
            <option>In Progress</option>
            <option>Waiting Parts</option>
          </select>
        </div>
        <div class="form-row"><label class="form-label">Date</label><input class="form-input" id="woDate" type="date"></div>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Cancel</button>
      <button class="btn btn--primary" id="saveWoBtn"><i class="fas fa-check"></i> Create WO</button>
    </div>
  </div>
</div>

<script src="/app/js/utils.js?v=20260720w"></script>
<script src="/app/js/demo-mode.js?v=20260720w"></script>
<script src="/app/js/data-store.js?v=20260720w"></script>
<script src="/app/js/auth.js?v=20260720w"></script>
<script src="/app/js/data-service.js?v=20260720w"></script>
<script src="/app/js/documents.js?v=20260720w"></script>
<script src="/app/js/page-scripts.js?v=20260720w"></script>
<script src="/app/js/app-components.js?v=20260721c"></script>
<script>
  let activeFilter = 'all', searchVal = '', urlState = {};

  function woMatchesFilter(w) {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'actionable') {
      return ['Open', 'In Progress', 'Waiting Parts'].includes(w.status)
        || (w.status === 'Completed' && !w.invoiced);
    }
    if (activeFilter === 'mtd') {
      return w.status === 'Completed' && ARS.Pages.isMtd(w.completedAt || w.updatedAt || w.date);
    }
    if (activeFilter === 'Invoiced') return w.invoiced || w.status === 'Invoiced';
    return ARS.Pages.matchesStatusFilter(w.status, activeFilter, 'workOrders');
  }

  function getFilteredWorkOrders() {
    let data = ARS.Data.listWorkOrders({ q: searchVal });
    if (urlState.customerId) data = data.filter((w) => w.customerId === urlState.customerId);
    if (urlState.truckId) data = data.filter((w) => w.truckId === urlState.truckId);
    return data.filter(woMatchesFilter);
  }

  function renderKpis() {
    const kpis = ARS.Data.getDashboardKPIs();
    document.getElementById('kpiOpen').textContent = kpis.openByStatus.Open || 0;
    document.getElementById('kpiInProgress').textContent = kpis.openByStatus['In Progress'] || 0;
    document.getElementById('kpiWaitingParts').textContent = kpis.openByStatus['Waiting Parts'] || 0;
    document.getElementById('kpiCompletedMTD').textContent = kpis.completedMTD || 0;
  }

  function renderTable() {
    renderKpis();
    const data = getFilteredWorkOrders();
    document.getElementById('woCount').textContent = `${data.length} order${data.length !== 1 ? 's' : ''}`;
    const canInvoice = ARS.can('workOrders.invoice');
    document.getElementById('woTable').innerHTML = data.length ? data.map(w => `
      <tr data-row-id="${ARS.Pages.escapeHtml(w.id)}" style="cursor:pointer">
        <td class="td-mono td-bold" style="white-space:nowrap">${ARS.Pages.entityLink(w.id, `/app/work-order-detail.html?id=${w.id}`)}</td>
        <td class="td-muted" style="white-space:nowrap">${ARS.Pages.escapeHtml(w.date)}</td>
        <td class="td-primary">${ARS.Pages.entityLink(w.customerName, w.customerId ? `/app/customer-detail.html?id=${w.customerId}` : '')}</td>
        <td class="td-muted td-wrap" style="font-size:.76rem;line-height:1.4">${w.truckId ? ARS.Pages.entityLink(w.truckLabel || '—', `/app/truck-detail.html?id=${w.truckId}`) : ARS.Pages.escapeHtml(w.truckLabel || '—')}</td>
        <td class="td-wrap" style="font-size:.8rem;color:var(--steel)">${ARS.Pages.escapeHtml(w.desc)}</td>
        <td class="td-muted">${ARS.Pages.escapeHtml(ARS.Data.formatWoTechs(w))}</td>
        <td style="text-align:right">${fmt$(w.labor)}</td>
        <td style="text-align:right">${fmt$(w.parts)}</td>
        <td style="text-align:right;font-weight:700">${fmt$(w.total)}</td>
        <td>${chip(w.status)}</td>
        <td class="td-actions">
          <a class="btn btn--ghost btn--sm btn--icon" href="/app/work-order-detail.html?id=${encodeURIComponent(w.id)}" title="View"><i class="fas fa-eye"></i></a>
          ${w.status === 'Completed' && !w.invoiced && canInvoice ? `<button class="btn btn--primary btn--sm" data-invoice-wo="${ARS.Pages.escapeHtml(w.id)}">Invoice</button>` : ''}
        </td>
      </tr>
    `).join('') : ARS.Pages.tablePlaceholder(11, 'No work orders found', 'fa-clipboard-list');
  }

  window.invoiceWO = async (id) => {
    if (!ARS.can('workOrders.invoice')) return showToast('Permission denied', 'error');
    try {
      const inv = await ARS.Data.createInvoiceFromWO(id);
      renderTable();
      ARS.Pages.successWithView({
        title: 'Invoice created',
        message: `${inv.id} created from ${id}.`,
        href: `/app/invoice-detail.html?id=${inv.id}`,
      });
    } catch (e) {
      showToast(e.message, 'error');
    }
  };

  function initCreateModal() {
    const custSel = document.getElementById('woCustomer');
    const truckSel = document.getElementById('woTruck');
    ARS.Pages.populateCustomerSelect(custSel);
    ARS.Pages.populateServiceSelect(document.getElementById('woServiceType'));
    ARS.Pages.populateTechMultiSelect(document.getElementById('woTechPicker'));
    document.getElementById('woDate').value = ARS.toInputDate();

    if (urlState.customerId) {
      custSel.value = urlState.customerId;
      ARS.Pages.populateTruckSelect(truckSel, urlState.customerId, urlState.truckId || '');
    }

    custSel.addEventListener('change', () => {
      ARS.Pages.populateTruckSelect(truckSel, custSel.value);
    });
  }

  ARS.Pages.waitReady(() => {
    urlState = ARS.Pages.applyListQuery({ tabsId: 'woFilterTabs', searchId: 'woSearch' });
    activeFilter = urlState.filter;
    searchVal = urlState.q || '';
    initCreateModal();
    ARS.Pages.openModalIfRequested('createWoModal');
    renderTable();

    document.getElementById('createWoBtn')?.addEventListener('click', async () => {
      await ARS.Data.refreshTechs?.();
      ARS.Pages.populateTechMultiSelect(document.getElementById('woTechPicker'));
      openModal('createWoModal');
    });
    document.addEventListener('ars:techs-changed', () => {
      ARS.Pages.populateTechMultiSelect(document.getElementById('woTechPicker'), ARS.Pages.getSelectedTechs(document.getElementById('woTechPicker')));
    });
    document.addEventListener('ars:data-changed', () => {
      ARS.Pages.populateTechMultiSelect(document.getElementById('woTechPicker'), ARS.Pages.getSelectedTechs(document.getElementById('woTechPicker')));
    });

    ARS.Pages.bindKpiFilter('kpiOpen', '/app/work-orders.html?status=Open');
    ARS.Pages.bindKpiFilter('kpiInProgress', '/app/work-orders.html?status=In Progress');
    ARS.Pages.bindKpiFilter('kpiWaitingParts', '/app/work-orders.html?status=Waiting Parts');
    ARS.Pages.bindKpiFilter('kpiCompletedMTD', '/app/work-orders.html?status=mtd');
    document.getElementById('woTable')?.addEventListener('click', (e) => {
      const invoice = e.target.closest('[data-invoice-wo]');
      if (invoice) {
        invoiceWO(invoice.dataset.invoiceWo);
        return;
      }
      if (e.target.closest('a,button')) return;
      const tr = e.target.closest('tr[data-row-id]');
      if (tr) window.location.href = ARS.Pages.appHref(`/app/work-order-detail.html?id=${tr.dataset.rowId}`);
    });
    ARS.Pages.bindFilters('woFilterTabs', 'woSearch', 'woCount', ({ filter, q }) => {
      if (filter !== undefined) activeFilter = filter;
      if (q !== undefined) searchVal = q;
      renderTable();
    });
    document.addEventListener('ars:data-changed', renderTable);

    document.getElementById('woExportBtn')?.addEventListener('click', () => {
      const rows = ARS.Data.listWorkOrders().map(w =>
        [w.id, w.date, w.customerName, w.truckLabel, ARS.Data.formatWoTechs(w, ''), w.status, w.labor, w.parts, w.total]
      );
      ARS.exportCSV('work-orders.csv', ['WO','Date','Customer','Truck','Tech','Status','Labor','Parts','Total'], rows);
      showToast('Work orders exported', 'success');
    });

    document.getElementById('saveWoBtn')?.addEventListener('click', async () => {
      if (!ARS.can('workOrders.create')) return showToast('Permission denied', 'error');
      const custSel = document.getElementById('woCustomer');
      const truckSel = document.getElementById('woTruck');
      const customerId = custSel.value;
      const truckId = truckSel.value;
      const desc = document.getElementById('woDesc').value.trim();
      if (!customerId || !truckId || !desc) return showToast('Customer, truck, and description required', 'error');
      const custOpt = custSel.selectedOptions[0];
      const truckOpt = truckSel.selectedOptions[0];
      try {
        const techs = ARS.Pages.getSelectedTechs(document.getElementById('woTechPicker'));
        const wo = await ARS.Data.createWorkOrder({
          customerId,
          customerName: custOpt?.dataset.name || custOpt?.textContent,
          truckId,
          truckLabel: truckOpt?.dataset.label || truckOpt?.textContent,
          serviceType: document.getElementById('woServiceType').value,
          techs,
          desc,
          labor: document.getElementById('woLabor').value,
          parts: document.getElementById('woParts').value,
          status: document.getElementById('woStatus').value,
          date: document.getElementById('woDate').value,
        });
        closeModal('createWoModal');
        document.getElementById('woDesc').value = '';
        document.getElementById('woLabor').value = '';
        document.getElementById('woParts').value = '';
        ARS.Pages.populateTechMultiSelect(document.getElementById('woTechPicker'));
        renderTable();
        ARS.Pages.successWithView({
          title: 'Work order created',
          message: `${wo.id} has been created successfully.`,
          href: `/app/work-order-detail.html?id=${wo.id}`,
        });
      } catch (e) {
        showToast(e.message, 'error');
      }
    });
  });
</script>
</body>
</html>
