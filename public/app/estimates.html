<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Estimates | Alex Road Service Ops</title>
  <link rel="stylesheet" href="/app/css/app.css?v=20260720w">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">
<div id="sidebar-placeholder"></div>
<main class="app-main">
  <div id="topbar-placeholder" data-title="Estimates"></div>
  <div class="app-content">

    <div class="page-header">
      <div>
        <div class="page-header__title">Estimates</div>
        <div class="page-header__sub">Generate and track service estimates before work begins</div>
      </div>
      <div class="page-header__actions">
        <button class="btn btn--secondary btn--sm" id="estExportBtn"><i class="fas fa-download"></i> Export</button>
        <button class="btn btn--primary" onclick="openModal('createEstModal')"><i class="fas fa-plus"></i> New Estimate</button>
      </div>
    </div>

    <!-- KPI Row -->
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Total Estimates</div><div class="kpi-card__value" id="kpiEstTotal">0</div></div>
          <div class="kpi-card__icon blue"><i class="fas fa-file-alt"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Awaiting Response</div><div class="kpi-card__value amber" id="kpiEstPending">0</div></div>
          <div class="kpi-card__icon amber"><i class="fas fa-clock"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Approved</div><div class="kpi-card__value green" id="kpiEstApproved">0</div></div>
          <div class="kpi-card__icon green"><i class="fas fa-check-circle"></i></div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-card__row">
          <div><div class="kpi-card__label">Est. Value (Awaiting)</div><div class="kpi-card__value" id="kpiEstValue">$0</div></div>
          <div class="kpi-card__icon blue"><i class="fas fa-dollar-sign"></i></div>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-tabs" id="estFilterTabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="Pending">Pending</button>
        <button class="filter-tab" data-filter="Approved">Approved</button>
        <button class="filter-tab" data-filter="Declined">Declined</button>
      </div>
      <div class="filter-search">
        <i class="fas fa-search"></i>
        <input type="text" id="estSearch" placeholder="Search by customer or EST #…">
      </div>
      <span class="filter-count" id="estCount"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>EST #</th><th>Date</th><th>Customer</th><th>Truck</th>
            <th>Description</th><th>Labor</th><th>Parts</th><th>Total</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="estTable"><tr><td colspan="10"><div class="loading-state"><div class="loading-state__spinner"></div><div class="loading-state__text">Loading…</div></div></td></tr></tbody>
      </table>
    </div>

  </div>
</main>

<!-- Create Estimate Modal -->
<div class="modal-overlay" id="createEstModal">
  <div class="modal" style="max-width:580px">
    <div class="modal__header">
      <div class="modal__title">New Estimate</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Customer *</label>
          <select class="form-select" id="estCustomer"></select>
        </div>
        <div class="form-row">
          <label class="form-label">Truck / Unit *</label>
          <select class="form-select" id="estTruck"></select>
        </div>
      </div>
      <div class="form-row"><label class="form-label">Work Description *</label><textarea class="form-textarea" id="estDesc" placeholder="Describe the work to estimate…"></textarea></div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Labor Estimate ($)</label><input class="form-input" id="estLabor" type="number" placeholder="0.00" min="0" step="0.01"></div>
        <div class="form-row"><label class="form-label">Parts Estimate ($)</label><input class="form-input" id="estParts" type="number" placeholder="0.00" min="0" step="0.01"></div>
      </div>
      <div class="form-row"><label class="form-label">Notes</label><textarea class="form-textarea" id="estNotes" placeholder="Any additional notes or conditions…"></textarea></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Cancel</button>
      <button class="btn btn--primary" id="saveEstBtn"><i class="fas fa-check"></i> Create Estimate</button>
    </div>
  </div>
</div>

<script src="/app/js/utils.js?v=20260720w"></script>
<script src="/app/js/demo-mode.js?v=20260720w"></script>
<script src="/app/js/data-store.js?v=20260720w"></script>
<script src="/app/js/auth.js?v=20260720w"></script>
<script src="/app/js/data-service.js?v=20260720w"></script>
<script src="/app/js/documents.js?v=20260720w"></script>
<script src="/app/js/page-scripts.js?v=20260720w"></script>
<script src="/app/js/app-components.js?v=20260721c"></script>
<script>
  let activeFilter = 'all', searchVal = '', urlState = {};

  function getFilteredEstimates() {
    let data = ARS.Data.listEstimates({ q: searchVal });
    if (urlState.customerId) data = data.filter((e) => e.customerId === urlState.customerId);
    if (activeFilter === 'all') return data;
    if (activeFilter === 'awaiting') {
      return data.filter((e) => ARS.Pages.matchesStatusFilter(e.status, 'awaiting', 'estimates'));
    }
    return data.filter((e) => ARS.Pages.matchesStatusFilter(e.status, activeFilter, 'estimates'));
  }

  function renderKpis(all) {
    const pending = all.filter(e => e.status === 'Pending' || e.status === 'Sent');
    const pendingValue = pending.reduce((s, e) => s + e.total, 0);
    document.getElementById('kpiEstTotal').textContent = all.length;
    document.getElementById('kpiEstPending').textContent = pending.length;
    document.getElementById('kpiEstApproved').textContent = all.filter(e => e.status === 'Approved').length;
    document.getElementById('kpiEstValue').textContent = fmt$(pendingValue);
  }

  function renderTable() {
    const data = getFilteredEstimates();
    const all = ARS.Data.listEstimates();
    renderKpis(all);
    document.getElementById('estCount').textContent = `${data.length} estimate${data.length !== 1 ? 's' : ''}`;
    document.getElementById('estTable').innerHTML = data.length ? data.map(e => `
      <tr data-row-id="${ARS.Pages.escapeHtml(e.id)}" style="cursor:pointer">
        <td class="td-mono td-bold">${ARS.Pages.entityLink(e.id, `/app/estimate-detail.html?id=${e.id}`)}</td>
        <td class="td-muted">${ARS.Pages.escapeHtml(e.date)}</td>
        <td class="td-primary">${ARS.Pages.entityLink(e.customerName, e.customerId ? `/app/customer-detail.html?id=${e.customerId}` : '')}</td>
        <td class="td-muted" style="font-size:.76rem">${ARS.Pages.escapeHtml(e.truckLabel || '—')}</td>
        <td class="td-wrap" style="font-size:.8rem;color:var(--steel)">${ARS.Pages.escapeHtml(e.desc)}</td>
        <td style="text-align:right">${fmt$(e.labor)}</td>
        <td style="text-align:right">${fmt$(e.parts)}</td>
        <td style="text-align:right;font-weight:700">${fmt$(e.total)}</td>
        <td>${chip(e.status)}</td>
        <td class="td-actions">
          <button class="btn btn--ghost btn--sm btn--icon" data-est-action="print" data-est-id="${ARS.Pages.escapeHtml(e.id)}" title="Print"><i class="fas fa-print"></i></button>
          ${e.status === 'Approved' ? `<button class="btn btn--primary btn--sm" data-est-action="convert" data-est-id="${ARS.Pages.escapeHtml(e.id)}">→ WO</button>` : ''}
          ${e.status === 'Pending' || e.status === 'Sent' ? `
            <button class="btn btn--secondary btn--sm" data-est-action="send" data-est-id="${ARS.Pages.escapeHtml(e.id)}" title="Send"><i class="fas fa-paper-plane"></i></button>
            <button class="btn btn--ghost btn--sm" data-est-action="approve" data-est-id="${ARS.Pages.escapeHtml(e.id)}" title="Approve"><i class="fas fa-check"></i></button>
            <button class="btn btn--ghost btn--sm" data-est-action="decline" data-est-id="${ARS.Pages.escapeHtml(e.id)}" title="Decline"><i class="fas fa-times"></i></button>
          ` : ''}
        </td>
      </tr>
    `).join('') : ARS.Pages.tablePlaceholder(10, 'No estimates found', 'fa-file-alt');
  }

  window.sendEst = async (id) => {
    if (!ARS.can('estimates.send')) return showToast('Permission denied', 'error');
    try {
      await ARS.Data.updateEstimate(id, { status: 'Sent' });
      renderTable();
      showToast('Estimate marked as Sent', 'success');
    } catch (e) {
      showToast(e.message, 'error');
    }
  };

  window.approveEst = async (id) => {
    if (!ARS.can('estimates.send')) return showToast('Permission denied', 'error');
    try {
      await ARS.Data.updateEstimate(id, { status: 'Approved' });
      renderTable();
      showToast('Estimate approved', 'success');
    } catch (e) {
      showToast(e.message, 'error');
    }
  };

  window.declineEst = async (id) => {
    if (!ARS.can('estimates.send')) return showToast('Permission denied', 'error');
    const ok = await ARS.Pages.confirmAsync({
      title: 'Decline estimate',
      message: `Decline ${id}? This marks the estimate as Declined.`,
      okLabel: 'Decline',
    });
    if (!ok) return;
    try {
      await ARS.Data.updateEstimate(id, { status: 'Declined' });
      renderTable();
      showToast('Estimate declined', 'warning');
    } catch (e) {
      showToast(e.message, 'error');
    }
  };

  window.convertEst = async (id) => {
    try {
      const wo = await ARS.Data.convertEstimateToWO(id);
      renderTable();
      ARS.Pages.successWithView({
        title: 'Work order created',
        message: `Estimate converted to ${wo.id}.`,
        href: `/app/work-order-detail.html?id=${wo.id}`,
      });
    } catch (e) {
      showToast(e.message, 'error');
    }
  };

  ARS.Pages.waitReady(() => {
    urlState = ARS.Pages.applyListQuery({ tabsId: 'estFilterTabs', searchId: 'estSearch' });
    activeFilter = urlState.filter;
    searchVal = urlState.q || '';
    const custSel = document.getElementById('estCustomer');
    const truckSel = document.getElementById('estTruck');
    ARS.Pages.populateCustomerSelect(custSel, urlState.customerId || '');
    if (urlState.customerId) ARS.Pages.populateTruckSelect(truckSel, urlState.customerId, urlState.truckId || '');
    custSel.addEventListener('change', () => ARS.Pages.populateTruckSelect(truckSel, custSel.value));
    ARS.Pages.openModalIfRequested('createEstModal');
    renderTable();
    ARS.Pages.bindKpiFilter('kpiEstTotal', '/app/estimates.html');
    ARS.Pages.bindKpiFilter('kpiEstPending', '/app/estimates.html?status=awaiting');
    ARS.Pages.bindKpiFilter('kpiEstApproved', '/app/estimates.html?status=Approved');
    ARS.Pages.bindKpiFilter('kpiEstValue', '/app/estimates.html?status=awaiting');
    document.getElementById('estTable')?.addEventListener('click', (e) => {
      const action = e.target.closest('[data-est-action]');
      if (action) {
        const handlers = {
          print: (id) => ARS.Documents.printEstimate(id),
          convert: convertEst,
          send: sendEst,
          approve: approveEst,
          decline: declineEst,
        };
        handlers[action.dataset.estAction]?.(action.dataset.estId);
        return;
      }
      if (e.target.closest('a,button')) return;
      const tr = e.target.closest('tr[data-row-id]');
      if (tr) window.location.href = ARS.Pages.appHref(`/app/estimate-detail.html?id=${tr.dataset.rowId}`);
    });
    ARS.Pages.bindFilters('estFilterTabs', 'estSearch', 'estCount', ({ filter, q }) => {
      if (filter !== undefined) activeFilter = filter;
      if (q !== undefined) searchVal = q;
      renderTable();
    });
    document.addEventListener('ars:data-changed', renderTable);

    document.getElementById('estExportBtn')?.addEventListener('click', () => {
      const rows = ARS.Data.listEstimates().map(e =>
        [e.id, e.date, e.customerName, e.truckLabel, e.desc, e.labor, e.parts, e.total, e.status, e.notes || '']
      );
      ARS.exportCSV('estimates.csv', ['ID','Date','Customer','Truck','Description','Labor','Parts','Total','Status','Notes'], rows);
      showToast('Estimates exported', 'success');
    });

    document.getElementById('saveEstBtn')?.addEventListener('click', async () => {
      if (!ARS.can('estimates.create')) return showToast('Permission denied', 'error');
      const customerId = custSel.value;
      const truckId = truckSel.value;
      const desc = document.getElementById('estDesc').value.trim();
      if (!customerId || !truckId || !desc) return showToast('Customer, truck, and description required', 'error');
      const custOpt = custSel.selectedOptions[0];
      const truckOpt = truckSel.selectedOptions[0];
      try {
        const est = await ARS.Data.createEstimate({
          customerId,
          customerName: custOpt?.dataset.name || custOpt?.textContent,
          truckLabel: truckOpt?.dataset.label || truckOpt?.textContent,
          desc,
          notes: document.getElementById('estNotes')?.value.trim() || '',
          labor: document.getElementById('estLabor').value,
          parts: document.getElementById('estParts').value,
        });
        closeModal('createEstModal');
        document.getElementById('estDesc').value = '';
        document.getElementById('estLabor').value = '';
        document.getElementById('estParts').value = '';
        document.getElementById('estNotes').value = '';
        renderTable();
        ARS.Pages.successWithView({
          title: 'Estimate created',
          message: `${est.id} has been saved.`,
          href: `/app/estimate-detail.html?id=${est.id}`,
        });
      } catch (e) {
        showToast(e.message, 'error');
      }
    });
  });
</script>
</body>
</html>
