<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>Contact Leads | Alex Road Service Ops</title>
  <link rel="stylesheet" href="/app/css/app.css?v=20260720w">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="app-body">
<div id="sidebar-placeholder"></div>
<main class="app-main">
  <div id="topbar-placeholder" data-title="Contact Leads"></div>
  <div class="app-content">
    <div class="page-header">
      <div>
        <div class="page-header__title">Website Leads</div>
        <div class="page-header__sub">Contact form submissions from the public site</div>
      </div>
      <div class="page-header__actions">
        <button class="btn btn--secondary btn--sm" id="leadsExport"><i class="fas fa-download"></i> Export</button>
      </div>
    </div>
    <div class="filter-bar">
      <div class="filter-tabs" id="leadsFilterTabs">
        <button class="filter-tab active" data-filter="New">New</button>
        <button class="filter-tab" data-filter="Contacted">Contacted</button>
        <button class="filter-tab" data-filter="Closed">Closed</button>
        <button class="filter-tab" data-filter="Converted">Converted</button>
        <button class="filter-tab" data-filter="all">All</button>
      </div>
      <div class="filter-search">
        <i class="fas fa-search"></i>
        <input type="text" id="leadsSearch" placeholder="Search leads…">
      </div>
      <span class="filter-count" id="leadsCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Date</th><th>Name</th><th>Phone</th><th>Email</th><th>Service</th><th>Status</th><th>Message</th><th></th></tr>
        </thead>
        <tbody id="leadsTable"><tr><td colspan="8"><div class="loading-state"><div class="loading-state__spinner"></div><div class="loading-state__text">Loading…</div></div></td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<!-- Lead detail drawer -->
<div class="drawer-overlay" id="leadDrawer">
  <div class="drawer" role="dialog" aria-modal="true">
    <div class="drawer__header">
      <div class="drawer__title" id="leadDrawerTitle">Lead</div>
      <button class="modal__close" type="button" id="leadDrawerClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="drawer__body" id="leadDrawerBody"></div>
    <div class="drawer__footer" id="leadDrawerFooter"></div>
  </div>
</div>

<!-- Convert to customer modal -->
<div class="modal-overlay" id="convertLeadModal">
  <div class="modal">
    <div class="modal__header">
      <div class="modal__title">Convert Lead → Customer</div>
      <button class="modal__close" data-close-modal><i class="fas fa-times"></i></button>
    </div>
    <div class="modal__body">
      <input type="hidden" id="convertLeadId">
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">First Name *</label><input class="form-input" id="clFirst"></div>
        <div class="form-row"><label class="form-label">Last Name *</label><input class="form-input" id="clLast"></div>
      </div>
      <div class="form-row"><label class="form-label">Company Name</label><input class="form-input" id="clCompany"></div>
      <div class="form-row-2">
        <div class="form-row"><label class="form-label">Phone *</label><input class="form-input" id="clPhone" type="tel"></div>
        <div class="form-row"><label class="form-label">Email</label><input class="form-input" id="clEmail" type="email"></div>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label class="form-label">Customer Type</label>
          <select class="form-select" id="clType"><option>Fleet</option><option>Owner-Op</option></select>
        </div>
        <div class="form-row"><label class="form-label">Number of Trucks</label><input class="form-input" id="clTrucks" type="number" min="1" value="1"></div>
      </div>
      <div class="form-row"><label class="form-label">Notes</label><textarea class="form-textarea" id="clNotes" rows="3"></textarea></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn--secondary" data-close-modal>Cancel</button>
      <button class="btn btn--primary" id="saveConvertLeadBtn"><i class="fas fa-user-plus"></i> Create Customer</button>
    </div>
  </div>
</div>

<script src="/app/js/utils.js?v=20260720w"></script>
<script src="/app/js/demo-mode.js?v=20260720w"></script>
<script src="/app/js/data-store.js?v=20260720w"></script>
<script src="/app/js/auth.js?v=20260720w"></script>
<script src="/app/js/data-service.js?v=20260720w"></script>
<script src="/app/js/page-scripts.js?v=20260720w"></script>
<script src="/app/js/app-components.js?v=20260720w"></script>
<script>
  let searchVal = '';
  let activeFilter = 'New';
  let urlState = {};
  let openLeadId = '';

  function leadStatus(l) {
    return l.status || 'New';
  }

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  function closeLeadDrawer() {
    document.getElementById('leadDrawer')?.classList.remove('open');
    openLeadId = '';
  }

  function openLeadDrawer(id) {
    const l = ARS.Data.listContactSubmissions().find((x) => x.id === id);
    if (!l) return showToast('Lead not found', 'error');
    openLeadId = id;
    const status = leadStatus(l);
    document.getElementById('leadDrawerTitle').textContent = l.name || 'Lead';
    document.getElementById('leadDrawerBody').innerHTML = `
      <div style="display:flex;flex-direction:column;gap:14px;font-size:.88rem">
        <div><div class="form-label">Status</div>${chip(status)}</div>
        <div><div class="form-label">Submitted</div><div>${ARS.fmtDate(l.createdAt || l.timestamp)}</div></div>
        <div><div class="form-label">Phone</div>
          ${l.phone ? `<a href="tel:${String(l.phone).replace(/\D/g, '')}" style="color:var(--red)">${esc(l.phone)}</a>` : '—'}
        </div>
        <div><div class="form-label">Email</div>
          ${l.email ? `<a href="mailto:${esc(l.email)}" style="color:var(--red)">${esc(l.email)}</a>` : '—'}
        </div>
        <div><div class="form-label">Company</div><div>${esc(l.company || '—')}</div></div>
        <div><div class="form-label">Location</div><div>${esc(l.location || '—')}</div></div>
        <div><div class="form-label">Service</div><div>${esc(l.service || '—')}</div></div>
        <div>
          <div class="form-label">Full message</div>
          <div style="white-space:pre-wrap;line-height:1.5;background:rgba(0,0,0,.03);padding:12px;border-radius:8px">${esc(l.message || '—')}</div>
        </div>
        <div id="leadMediaMount"></div>
      </div>`;

    ARS.MediaUI.mount(document.getElementById('leadMediaMount'), {
      entityType: 'leads',
      entityId: l.id,
      title: 'Photos & videos',
      getEntity: () => ARS.Data.listContactSubmissions().find((x) => x.id === l.id),
    });
    const canConvert = status !== 'Converted' && ARS.can('customers.create');
    document.getElementById('leadDrawerFooter').innerHTML = `
      ${l.email ? `<a class="btn btn--secondary" href="mailto:${esc(l.email)}"><i class="fas fa-envelope"></i> Email</a>` : ''}
      ${status === 'New' ? `<button class="btn btn--primary" onclick="setLeadStatus('${l.id}','Contacted')">Mark Contacted</button>` : ''}
      ${canConvert ? `<button class="btn btn--primary" onclick="openConvertLead('${l.id}')"><i class="fas fa-user-plus"></i> Convert to Customer</button>` : ''}
      ${status === 'New' || status === 'Contacted' ? `<button class="btn btn--ghost" onclick="setLeadStatus('${l.id}','Closed')">Dismiss</button>` : ''}
    `;
    document.getElementById('leadDrawer')?.classList.add('open');
  }

  function render() {
    let data = ARS.Data.listContactSubmissions(
      activeFilter === 'all' ? {} : { status: activeFilter }
    );
    if (searchVal) {
      const q = searchVal.toLowerCase();
      data = data.filter((l) =>
        (l.name || '').toLowerCase().includes(q) ||
        (l.phone || '').includes(q) ||
        (l.email || '').toLowerCase().includes(q) ||
        (l.message || '').toLowerCase().includes(q) ||
        (l.company || '').toLowerCase().includes(q)
      );
    }
    document.getElementById('leadsCount').textContent = `${data.length} lead${data.length !== 1 ? 's' : ''}`;
    document.getElementById('leadsTable').innerHTML = data.length ? data.map((l) => {
      const status = leadStatus(l);
      const msg = (l.message || '—').slice(0, 60) + ((l.message || '').length > 60 ? '…' : '');
      return `
      <tr data-row-id="${l.id}" style="cursor:pointer" onclick="if(!event.target.closest('a,button')) openLeadDrawer('${l.id}')">
        <td class="td-muted">${ARS.fmtDate(l.createdAt || l.timestamp)}</td>
        <td class="td-primary">${esc(l.name || '—')}</td>
        <td><a href="tel:${String(l.phone || '').replace(/\D/g, '')}" style="color:var(--red)">${esc(l.phone || '—')}</a></td>
        <td>${l.email ? `<a href="mailto:${esc(l.email)}" style="color:inherit">${esc(l.email)}</a>` : '—'}</td>
        <td>${esc(l.service || '—')}</td>
        <td>${chip(status)}</td>
        <td class="td-wrap" style="font-size:.8rem">${esc(msg)}</td>
        <td class="td-actions" style="white-space:nowrap" onclick="event.stopPropagation()">
          <button class="btn btn--ghost btn--sm" onclick="openLeadDrawer('${l.id}')" title="View"><i class="fas fa-eye"></i></button>
          ${status === 'New' ? `
            <button class="btn btn--primary btn--sm" onclick="setLeadStatus('${l.id}','Contacted')" title="Mark contacted">Contacted</button>
            <button class="btn btn--ghost btn--sm" onclick="setLeadStatus('${l.id}','Closed')" title="Dismiss">Dismiss</button>
          ` : status === 'Contacted' ? `
            <button class="btn btn--secondary btn--sm" onclick="openConvertLead('${l.id}')">Convert</button>
            <button class="btn btn--ghost btn--sm" onclick="setLeadStatus('${l.id}','Closed')">Close</button>
          ` : status === 'Converted' ? `
            <button class="btn btn--ghost btn--sm" onclick="openLeadDrawer('${l.id}')">View</button>
          ` : `
            <button class="btn btn--ghost btn--sm" onclick="setLeadStatus('${l.id}','New')">Reopen</button>
          `}
        </td>
      </tr>`;
    }).join('') : ARS.Pages.tablePlaceholder(8, 'No leads in this view', 'fa-inbox');

    if (openLeadId) {
      const still = data.find((l) => l.id === openLeadId) || ARS.Data.listContactSubmissions().find((l) => l.id === openLeadId);
      if (still) openLeadDrawer(openLeadId);
    }
  }

  window.openLeadDrawer = openLeadDrawer;

  window.openConvertLead = (id) => {
    const l = ARS.Data.listContactSubmissions().find((x) => x.id === id);
    if (!l) return showToast('Lead not found', 'error');
    const parts = String(l.name || '').trim().split(/\s+/);
    document.getElementById('convertLeadId').value = id;
    document.getElementById('clFirst').value = parts[0] || '';
    document.getElementById('clLast').value = parts.slice(1).join(' ') || '';
    document.getElementById('clCompany').value = l.company || '';
    document.getElementById('clPhone').value = l.phone || '';
    document.getElementById('clEmail').value = l.email || '';
    document.getElementById('clType').value = l.company ? 'Fleet' : 'Owner-Op';
    document.getElementById('clTrucks').value = '1';
    document.getElementById('clNotes').value = [
      l.service ? `Requested service: ${l.service}` : '',
      l.location ? `Location: ${l.location}` : '',
      l.message ? `Lead message:\n${l.message}` : '',
    ].filter(Boolean).join('\n\n');
    closeLeadDrawer();
    openModal('convertLeadModal');
  };

  window.setLeadStatus = async (id, status) => {
    const btn = document.activeElement;
    if (btn?.disabled !== undefined) btn.disabled = true;
    try {
      await ARS.Data.updateContactSubmission(id, { status });
      showToast(
        status === 'Closed' ? 'Lead dismissed' :
        status === 'Contacted' ? 'Lead marked Contacted' :
        status === 'New' ? 'Lead reopened' :
        `Lead marked ${status}`,
        'success'
      );
      render();
    } catch (e) {
      showToast(e.message || 'Could not update lead', 'error');
      render();
    } finally {
      if (btn?.disabled !== undefined) btn.disabled = false;
    }
  };

  ARS.Pages.waitReady(() => {
    if (!ARS.canAccessLeads()) {
      showToast('Permission denied', 'error');
      setTimeout(() => { location.href = '/app/dashboard.html'; }, 600);
      return;
    }
    urlState = ARS.Pages.applyListQuery({ tabsId: 'leadsFilterTabs', searchId: 'leadsSearch', defaultFilter: 'New' });
    activeFilter = urlState.filter;
    searchVal = urlState.q || '';
    render();
    ARS.Pages.bindFilters('leadsFilterTabs', 'leadsSearch', 'leadsCount', ({ filter, q }) => {
      if (filter !== undefined) activeFilter = filter;
      if (q !== undefined) searchVal = q;
      render();
    });
    document.addEventListener('ars:data-changed', render);
    document.getElementById('leadDrawerClose')?.addEventListener('click', closeLeadDrawer);
    document.getElementById('leadDrawer')?.addEventListener('click', (e) => {
      if (e.target.id === 'leadDrawer') closeLeadDrawer();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLeadDrawer();
    });
    document.getElementById('leadsExport')?.addEventListener('click', () => {
      const rows = ARS.Data.listContactSubmissions().map((l) =>
        [l.createdAt, l.name, l.phone, l.email, l.service, leadStatus(l), l.company, l.location, l.message]
      );
      ARS.exportCSV('leads.csv', ['Date', 'Name', 'Phone', 'Email', 'Service', 'Status', 'Company', 'Location', 'Message'], rows);
    });
    document.getElementById('saveConvertLeadBtn')?.addEventListener('click', async () => {
      const leadId = document.getElementById('convertLeadId').value;
      const firstName = document.getElementById('clFirst').value.trim();
      const lastName = document.getElementById('clLast').value.trim();
      const phone = document.getElementById('clPhone').value.trim();
      if (!firstName || !phone) return showToast('First name and phone are required', 'error');
      try {
        const customer = await ARS.Data.createCustomer({
          firstName,
          lastName,
          company: document.getElementById('clCompany').value.trim(),
          phone,
          email: document.getElementById('clEmail').value.trim(),
          type: document.getElementById('clType').value,
          truckCount: document.getElementById('clTrucks').value,
          notes: document.getElementById('clNotes').value.trim(),
        });
        await ARS.Data.updateContactSubmission(leadId, { status: 'Converted', convertedCustomerId: customer.id });
        closeModal('convertLeadModal');
        render();
        ARS.Pages.successWithView({
          title: 'Customer created',
          message: `${customer.name} created from lead.`,
          href: `/app/customer-detail.html?id=${customer.id}`,
        });
      } catch (e) {
        showToast(e.message || 'Could not convert lead', 'error');
      }
    });
    if (urlState.highlight) {
      setTimeout(() => openLeadDrawer(urlState.highlight), 200);
    }
  });
</script>
</body>
</html>
